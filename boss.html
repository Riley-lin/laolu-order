<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>老滷仙・老闆看單</title>
<!-- supabase-js：Supabase 官方的前端工具包（從 CDN 載入，不用安裝） -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  /* ====== 版面：深色金字，跟點餐頁同一家店的氣質 ====== */
  :root{
    --bg:#141210; --card:#1f1b17; --line:rgba(212,165,32,0.25);
    --gold:#d4a520; --gold2:#e8c358; --goldlight:#f3dfa5;
    --text:rgba(255,255,255,0.85); --dim:rgba(255,255,255,0.45);
    --green:#7fc97f; --red:#e07a5f;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:"Noto Sans TC",system-ui,sans-serif;min-height:100vh;}
  .wrap{max-width:720px;margin:0 auto;padding:16px;}
  h1{font-family:"Noto Serif TC",serif;color:var(--gold2);font-size:22px;letter-spacing:4px;text-align:center;padding:14px 0 4px;}
  .sub{text-align:center;color:var(--dim);font-size:12px;letter-spacing:2px;margin-bottom:16px;}

  /* ====== 登入卡 ====== */
  .login-card{background:var(--card);border:1px solid var(--line);border-radius:8px;padding:24px;max-width:360px;margin:40px auto;}
  .login-card input{width:100%;padding:12px;margin-bottom:10px;border-radius:6px;border:1px solid var(--line);background:#141210;color:var(--text);font-size:15px;}
  .login-card button{width:100%;padding:12px;border:none;border-radius:6px;background:var(--gold);color:#1a1611;font-weight:900;font-size:15px;letter-spacing:3px;cursor:pointer;}
  .login-card button:disabled{opacity:0.5;}
  .login-err{color:var(--red);font-size:13px;text-align:center;margin-top:10px;min-height:18px;}

  /* ====== 工具列 ====== */
  .toolbar{display:flex;gap:8px;align-items:center;margin-bottom:14px;flex-wrap:wrap;}
  .tab{padding:8px 14px;border-radius:20px;border:1px solid var(--line);background:none;color:var(--dim);font-size:13px;cursor:pointer;letter-spacing:1px;}
  .tab.active{background:var(--gold);color:#1a1611;font-weight:900;border-color:var(--gold);}
  .toolbar .spacer{flex:1;}
  .btn-plain{padding:8px 14px;border-radius:6px;border:1px solid var(--line);background:none;color:var(--dim);font-size:13px;cursor:pointer;}

  /* ====== 訂單卡 ====== */
  .order-card{background:var(--card);border:1px solid var(--line);border-radius:8px;padding:14px 16px;margin-bottom:12px;}
  .order-card.is-new{border-color:var(--gold);box-shadow:0 0 12px rgba(212,165,32,0.15);}
  .oc-head{display:flex;justify-content:space-between;align-items:baseline;flex-wrap:wrap;gap:6px;margin-bottom:8px;}
  .oc-no{font-family:"Noto Serif TC",serif;font-size:20px;font-weight:900;color:var(--gold2);letter-spacing:2px;}
  .oc-time{color:var(--dim);font-size:12px;}
  .oc-cust{font-size:14px;margin-bottom:8px;}
  .oc-cust a{color:var(--goldlight);text-decoration:none;}
  .oc-sub{border-top:1px dashed var(--line);padding-top:8px;margin-top:8px;}
  .oc-sub-name{color:var(--gold2);font-size:13px;font-weight:700;margin-bottom:4px;}
  .oc-item{display:flex;justify-content:space-between;font-size:14px;padding:2px 0;}
  .oc-item span:last-child{color:var(--gold2);font-weight:700;}
  .oc-pref{color:var(--dim);font-size:12.5px;margin-top:4px;}
  .oc-foot{display:flex;justify-content:space-between;align-items:center;border-top:1px solid var(--line);margin-top:10px;padding-top:10px;}
  .oc-total{font-size:16px;font-weight:900;color:var(--gold2);}
  .oc-actions{display:flex;gap:8px;}
  .btn-done{padding:8px 16px;border:none;border-radius:6px;background:var(--green);color:#10240f;font-weight:900;font-size:13px;cursor:pointer;letter-spacing:1px;}
  .btn-cancel{padding:8px 12px;border:1px solid var(--red);border-radius:6px;background:none;color:var(--red);font-size:13px;cursor:pointer;}
  .badge{font-size:11px;padding:3px 10px;border-radius:12px;letter-spacing:1px;}
  .badge.new{background:rgba(212,165,32,0.18);color:var(--gold2);}
  .badge.cooking{background:rgba(255,140,66,0.18);color:#ff9d5c;}
  .badge.done{background:rgba(127,201,127,0.15);color:var(--green);}
  .badge.cancelled{background:rgba(224,122,95,0.15);color:var(--red);}
  .btn-accept{padding:8px 16px;border:none;border-radius:6px;background:var(--gold);color:#1a1611;font-weight:900;font-size:13px;cursor:pointer;letter-spacing:1px;}
  .btn-wait{padding:8px 14px;border:1px solid var(--gold);border-radius:6px;background:rgba(212,165,32,0.12);color:var(--gold2);font-weight:900;font-size:13px;cursor:pointer;}
  .oc-pickup{font-size:12px;color:#ff9d5c;margin-left:10px;letter-spacing:1px;}

  /* ====== 📱 LINE 訊息模擬預覽 ====== */
  .line-preview-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.65);display:flex;align-items:center;justify-content:center;z-index:99;padding:16px;}
  .line-preview{background:var(--card);border:1px solid var(--line);border-radius:10px;max-width:400px;width:100%;padding:18px;}
  .lp-title{font-size:14px;font-weight:900;color:var(--gold2);letter-spacing:1px;margin-bottom:12px;text-align:center;}
  .lp-chat{background:#7494c0;border-radius:8px;padding:16px 14px;}
  .lp-bubble{background:#fff;color:#222;border-radius:14px;border-top-left-radius:4px;padding:12px 14px;font-size:14px;line-height:1.7;max-width:90%;box-shadow:0 1px 2px rgba(0,0,0,0.2);}
  .lp-note{font-size:12px;color:var(--dim);margin-top:12px;line-height:1.6;text-align:center;}
  .lp-close{display:block;margin:14px auto 0;padding:9px 32px;border:none;border-radius:6px;background:var(--gold);color:#1a1611;font-weight:900;font-size:14px;letter-spacing:2px;cursor:pointer;}

  /* ====== ✅ 確認接單彈窗 ====== */
  .cm-label{font-size:12px;color:var(--dim);letter-spacing:2px;margin-bottom:8px;text-align:center;}
  .cm-presets{display:flex;gap:8px;justify-content:center;margin-bottom:12px;}
  .cm-preset{flex:1;padding:12px 0;font-size:15px;}
  .cm-preset.active{background:var(--gold);color:#1a1611;}
  .cm-stepper{display:flex;align-items:center;justify-content:center;gap:14px;margin-bottom:12px;}
  .cm-step{width:44px;height:44px;border-radius:50%;border:1px solid var(--line);background:none;color:var(--gold2);font-size:22px;font-weight:900;cursor:pointer;}
  .cm-mins{font-family:"Noto Serif TC",serif;font-size:28px;font-weight:900;color:var(--gold2);min-width:52px;text-align:center;}
  .cm-pickup{text-align:center;font-size:14px;color:#ff9d5c;letter-spacing:1px;margin-bottom:14px;min-height:20px;}
  .cm-actions{display:flex;gap:10px;}
  .empty{text-align:center;color:var(--dim);padding:50px 0;font-size:14px;letter-spacing:2px;}
  .hidden{display:none;}
</style>
</head>
<body>
<div class="wrap">
  <h1>🍢 老滷仙・看單台</h1>
  <div class="sub">BOSS ONLY・訂單即時瀏覽</div>

  <!-- ========== 登入區：老闆專用門禁 ========== -->
  <div id="loginView" class="login-card">
    <input id="email" type="email" placeholder="老闆帳號（email）" autocomplete="username">
    <input id="password" type="password" placeholder="密碼" autocomplete="current-password">
    <button id="loginBtn" onclick="doLogin()">登 入</button>
    <div class="login-err" id="loginErr"></div>
  </div>

  <!-- ========== 看單區：登入後才出現 ========== -->
  <div id="boardView" class="hidden">
    <div class="toolbar">
      <button class="tab active" data-f="new" onclick="setFilter('new',this)">🆕 新單</button>
      <button class="tab" data-f="confirmed" onclick="setFilter('confirmed',this)">🔥 製作中</button>
      <button class="tab" data-f="done" onclick="setFilter('done',this)">✅ 已完成</button>
      <button class="tab" data-f="all" onclick="setFilter('all',this)">全部</button>
      <span class="spacer"></span>
      <button class="btn-plain" onclick="loadOrders()">↻ 重新整理</button>
      <button class="btn-plain" onclick="doLogout()">登出</button>
    </div>
    <div id="orderList"><div class="empty">載入中…</div></div>
  </div>
</div>

<script>
/* ================================================================
   ☁️ 連上同一本雲端訂單簿（跟 index.html 同一組地址＋訪客證）
   老闆多一道門禁：要先登入（Supabase Auth），RLS 才放行「看單／改單」。
   ================================================================ */
const SUPABASE_URL = 'https://wwirnzsbqrqafyjrvgkn.supabase.co';
const SUPABASE_KEY = 'sb_publishable_eJLYMZhDGmE5dlYb4G5XbQ_DapXnnra';
const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let currentFilter = 'new';   // 目前的分頁：new＝新單 / done＝已完成 / all＝全部
let pollTimer = null;        // 自動刷新的計時器

/* ---------- 登入／登出 ---------- */
async function doLogin() {
  const btn = document.getElementById('loginBtn');
  btn.disabled = true;
  document.getElementById('loginErr').textContent = '';
  // 拿 email＋密碼去門禁室換通行證（之後每次讀資料都會自動帶著）
  const { error } = await db.auth.signInWithPassword({
    email: document.getElementById('email').value.trim(),
    password: document.getElementById('password').value
  });
  btn.disabled = false;
  if (error) {
    document.getElementById('loginErr').textContent = '登入失敗：帳號或密碼不對';
    return;
  }
  showBoard();
}

async function doLogout() {
  await db.auth.signOut();
  clearInterval(pollTimer);
  document.getElementById('boardView').classList.add('hidden');
  document.getElementById('loginView').classList.remove('hidden');
}

/* 進入看單模式：顯示列表＋每 15 秒自動抓一次新單 */
function showBoard() {
  document.getElementById('loginView').classList.add('hidden');
  document.getElementById('boardView').classList.remove('hidden');
  loadOrders();
  clearInterval(pollTimer);
  pollTimer = setInterval(loadOrders, 15000);
}

/* 打開頁面時：如果之前登入過還沒過期，直接進看單台 */
db.auth.getSession().then(({ data }) => { if (data.session) showBoard(); });

/* ---------- 讀訂單 ---------- */
function setFilter(f, el) {
  currentFilter = f;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  loadOrders();
}

async function loadOrders() {
  // 跟資料庫要最近 100 筆，最新的排最上面
  let query = db.from('orders').select('*').order('created_at', { ascending: false }).limit(100);
  if (currentFilter === 'new')       query = query.eq('status', 'new');
  if (currentFilter === 'confirmed') query = query.eq('status', 'confirmed');
  if (currentFilter === 'done')      query = query.eq('status', 'done');

  const { data, error } = await query;
  const list = document.getElementById('orderList');
  if (error) { list.innerHTML = '<div class="empty">讀取失敗，請按「重新整理」再試</div>'; return; }
  if (!data.length) { list.innerHTML = '<div class="empty">目前沒有訂單 🍃</div>'; return; }
  list.innerHTML = data.map(renderCard).join('');
}

/* 把一筆訂單畫成一張卡片 */
function renderCard(r) {
  // 資料庫存的是世界標準時間，顯示時轉成台北時間
  const t = new Date(r.created_at).toLocaleString('zh-TW', { timeZone: 'Asia/Taipei', hour12: false });

  // items 欄位裡是一包 JSON：每張子訂單的品項＋偏好
  let body = '';
  (r.items || []).forEach(o => {
    const rows = (o.items || []).map(v =>
      '<div class="oc-item"><span>' + esc(v.name) + ' × ' + v.qty + '</span><span>$' + (v.price * v.qty) + '</span></div>'
    ).join('');
    const prefs = formatPrefs(o.prefs);
    body += '<div class="oc-sub">'
      + (o.name ? '<div class="oc-sub-name">' + esc(o.name) + '</div>' : '')
      + rows
      + (prefs ? '<div class="oc-pref">🌿 ' + prefs + '</div>' : '')
      + '</div>';
  });

  const badge = r.status === 'new' ? '<span class="badge new">新單</span>'
              : r.status === 'confirmed' ? '<span class="badge cooking">製作中</span>'
              : r.status === 'done' ? '<span class="badge done">已完成</span>'
              : '<span class="badge cancelled">已取消</span>';

  // 新單 → 確認接單（先選等候時間）；製作中 → 完成
  let actions;
  if (r.status === 'new') {
    actions = '<div class="oc-actions">'
      + '<button class="btn-cancel" onclick="setStatus(\'' + r.id + '\',\'cancelled\')">取消</button>'
      + '<button class="btn-accept" onclick="openConfirmModal(\'' + r.id + '\',\'' + esc(r.order_no) + '\')">✅ 確認接單</button>'
      + '</div>';
  } else if (r.status === 'confirmed') {
    actions = '<div class="oc-actions">'
      + '<button class="btn-cancel" onclick="setStatus(\'' + r.id + '\',\'cancelled\')">取消</button>'
      + '<button class="btn-wait" onclick="openConfirmModal(\'' + r.id + '\',\'' + esc(r.order_no) + '\',true)">⏰ 改時間</button>'
      + '<button class="btn-done" onclick="setStatus(\'' + r.id + '\',\'done\')">完 成</button>'
      + '</div>';
  } else {
    actions = badge;
  }

  // 已確認的單：標題列顯示取餐時間，老闆一眼知道哪張快到期
  const pickupTag = (r.status === 'confirmed' && r.pickup_at)
    ? '<span class="oc-pickup">⏰ ' + fmtHM(r.pickup_at) + ' 取餐</span>' : '';

  return '<div class="order-card' + (r.status === 'new' ? ' is-new' : '') + '">'
    + '<div class="oc-head"><span class="oc-no">#' + esc(r.order_no) + pickupTag + '</span><span class="oc-time">' + t + '</span></div>'
    + '<div class="oc-cust">👤 ' + esc(r.customer_name) + '　📞 <a href="tel:' + esc(r.customer_phone) + '">' + esc(r.customer_phone) + '</a></div>'
    + body
    + '<div class="oc-foot"><span class="oc-total">合計 $' + r.total + '</span>' + actions + '</div>'
    + '</div>';
}

/* 口味偏好 JSON → 中文一行字（跟點餐頁的顯示規則一致） */
function formatPrefs(p) {
  if (!p) return '';
  const out = [];
  if (p.scallion === 'yes') out.push('加蔥'); else if (p.scallion === 'no') out.push('不要蔥');
  if (p.garlic === 'yes') out.push('加蒜'); else if (p.garlic === 'no') out.push('不要蒜');
  if (p.pepper === 'yes') out.push('加胡椒'); else if (p.pepper === 'no') out.push('不要胡椒');
  if (p.spicy === 'yes' && p.spiceLevel) out.push('辣度：' + p.spiceLevel); else if (p.spicy === 'no') out.push('不加辣');
  if (p.utensils === 'yes') out.push('要餐具🥢'); else if (p.utensils === 'no') out.push('不用餐具');
  if (p.note) out.push('備註：' + esc(p.note));
  return out.join('、');
}

/* ---------- 改訂單狀態（完成／取消） ---------- */
async function setStatus(id, status) {
  if (status === 'cancelled' && !confirm('確定要取消這張訂單嗎？')) return;
  const { error } = await db.from('orders').update({ status }).eq('id', id);
  if (error) { alert('更新失敗，請重試'); return; }
  loadOrders();
}

/* ---------- 確認接單流程 ---------- */

/* 按「確認接單」→ 彈出獨立小視窗選等候時間
   （做成彈窗有兩個理由：①15 秒自動刷新洗不掉它 ②有明確的返回、點背景＝取消，不會誤觸）*/
let _cmMins = 30;        // 彈窗目前選的分鐘數
let _cmUpdate = false;   // false＝首次確認接單／true＝已確認後修改取餐時間

function openConfirmModal(id, orderNo, isUpdate, keepMins) {
  if (!keepMins) _cmMins = 30; // 從預覽按「返回」回來時保留剛選的分鐘數，其餘情況重設
  _cmUpdate = !!isUpdate;
  const overlay = document.createElement('div');
  overlay.className = 'line-preview-overlay';
  overlay.id = 'confirmModal';
  overlay.innerHTML =
    '<div class="line-preview">'
    + '<div class="lp-title">' + (_cmUpdate ? '⏰ 修改取餐時間 #' : '✅ 確認接單 #') + orderNo + '</div>'
    + '<div class="cm-label">等候時間</div>'
    + '<div class="cm-presets">'
    +   [25, 30, 35].map(m => '<button class="btn-wait cm-preset" data-m="' + m + '" onclick="cmSetMins(' + m + ')">' + m + '分</button>').join('')
    + '</div>'
    + '<div class="cm-stepper">'
    +   '<button class="cm-step" onclick="cmStep(-5)">−</button>'
    +   '<span class="cm-mins" id="cmMins">30</span><span style="color:var(--dim);font-size:13px;">分鐘</span>'
    +   '<button class="cm-step" onclick="cmStep(5)">＋</button>'
    + '</div>'
    + '<div class="cm-pickup" id="cmPickup"></div>'
    + '<div class="cm-actions">'
    +   '<button class="btn-plain" style="flex:1;padding:11px;" onclick="document.getElementById(\'confirmModal\').remove()">↩ 返回</button>'
    +   '<button class="btn-accept" style="flex:2;padding:11px;" onclick="cmSubmit(\'' + id + '\')">' + (_cmUpdate ? '更新時間' : '確認送出') + '</button>'
    + '</div>'
    + '</div>';
  // 點背景＝取消（什麼都不會發生，不會誤選）
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
  document.body.appendChild(overlay);
  cmRefresh();
}

function cmSetMins(m) { _cmMins = m; cmRefresh(); }
function cmStep(d) {
  _cmMins = Math.min(180, Math.max(5, _cmMins + d)); // 5 分鐘一格，5～180 分之間
  cmRefresh();
}
function cmRefresh() {
  document.getElementById('cmMins').textContent = _cmMins;
  // 即時預覽取餐時間，老闆按下去前就知道會告訴客人幾點
  const pickup = new Date(Date.now() + _cmMins * 60000);
  document.getElementById('cmPickup').textContent = '客人取餐時間 → ' + fmtHM(pickup.toISOString());
  // 快選鍵高亮目前選中的
  document.querySelectorAll('.cm-preset').forEach(b =>
    b.classList.toggle('active', parseInt(b.dataset.m) === _cmMins));
}
/* 選完時間按「確認送出」→ 先跳訊息預覽（⚠️ 此時什麼都還沒生效！）
   預覽視窗按「知道了」才真正寫入資料庫（未來＝才真正發 LINE）；按「返回」可回來重選 */
async function cmSubmit(id) {
  document.getElementById('confirmModal')?.remove();
  // 撈這張單的內容，用「目前選的分鐘數」算出預覽用的取餐時間
  const { data: r, error } = await db.from('orders').select('*').eq('id', id).single();
  if (error || !r) { alert('讀取訂單失敗，請重試'); return; }
  const preview = Object.assign({}, r, {
    wait_minutes: _cmMins,
    pickup_at: new Date(Date.now() + _cmMins * 60000).toISOString()
  });
  showLinePreview(preview);
}

/* 預覽按「知道了」→ 真正生效：寫入確認狀態＋時間（送出後就不再改時間） */
async function commitConfirm(id) {
  const now = new Date();
  const pickup = new Date(now.getTime() + _cmMins * 60000); // 以按下知道了的時刻起算，最準
  const patch = _cmUpdate
    ? { wait_minutes: _cmMins, pickup_at: pickup.toISOString() }  // 改時間模式：不動狀態與首次確認時間
    : { status: 'confirmed', confirmed_at: now.toISOString(), wait_minutes: _cmMins, pickup_at: pickup.toISOString() };
  const { error } = await db.from('orders').update(patch).eq('id', id);
  if (error) { alert('送出失敗，請重試'); return; }
  loadOrders();
}

/* 世界標準時間 → 台北時間 HH:MM */
function fmtHM(iso) {
  return new Date(iso).toLocaleTimeString('zh-TW',
    { timeZone: 'Asia/Taipei', hour: '2-digit', minute: '2-digit', hour12: false });
}

/* ---------- 📱 通知訊息模擬預覽（假測試平台） ----------
   這裡就是未來 LINE 推播的「插座」：
   現在＝把訊息畫在螢幕上看樣子；M2/M3 串接後＝同一段訊息改成真的發進客人 LINE */
function buildCustomerMessage(r) {
  const items = (r.items || []).flatMap(o => (o.items || []).map(v => v.name + ' ×' + v.qty)).join('、');
  return '🍢 老滷仙\n'
    + '✅ 訂單確認！（取餐編號 #' + r.order_no + '）\n\n'
    + '食材新鮮現滷，等候時間約 ' + r.wait_minutes + ' 分鐘，\n'
    + '請於 ' + fmtHM(r.pickup_at) + ' 前往現場取餐。\n\n'
    + '📋 ' + items + '\n'
    + '💰 合計 $' + r.total;
}

/* 送出前的最後把關：看到訊息長相才決定要不要放行
   ↩ 返回＝回時間選擇（保留剛選的分鐘）；知道了＝真正送出生效 */
function showLinePreview(r) {
  const msg = buildCustomerMessage(r);
  const overlay = document.createElement('div');
  overlay.className = 'line-preview-overlay';
  overlay.innerHTML =
    '<div class="line-preview">'
    + '<div class="lp-title">📱 客人將收到的訊息（送出前預覽）</div>'
    + '<div class="lp-chat"><div class="lp-bubble">' + esc(msg).replace(/\n/g, '<br>') + '</div></div>'
    + '<div class="lp-note">按「知道了」才會生效送出；⏳ LINE 串接完成後，這則訊息會自動傳到客人的 LINE</div>'
    + '<div class="cm-actions" style="margin-top:14px;">'
    +   '<button class="btn-plain" style="flex:1;padding:10px;" onclick="this.closest(\'.line-preview-overlay\').remove();openConfirmModal(\'' + r.id + '\',\'' + esc(r.order_no) + '\',' + _cmUpdate + ',true)">↩ 返回</button>'
    +   '<button class="lp-close" style="flex:1;margin:0;" onclick="this.closest(\'.line-preview-overlay\').remove();commitConfirm(\'' + r.id + '\')">知道了</button>'
    + '</div>'
    + '</div>';
  // 點背景＝取消（不生效，跟按返回一樣安全）
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
  document.body.appendChild(overlay);
}

/* 防範惡意輸入：把客人填的文字裡的特殊符號變無害（資安基本功）*/
function esc(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
</script>
</body>
</html>
